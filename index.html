<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع ساهر - تحميل الأغاني</title>
    <style>
        /* الألوان والتنسيق */
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background: #1c1c1c;
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.2);
            text-align: center;
            border: 1px solid #333;
        }

        h1 {
            color: #ff0000;
            font-size: 28px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        p {
            color: #ccc;
            font-size: 16px;
        }

        .box {
            background: #252525;
            padding: 20px;
            border-radius: 15px;
            margin-top: 25px;
            border: 1px dashed #ff0000;
        }

        .password-box {
            background: #000;
            color: #00ff00;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
            margin: 15px 0;
            display: inline-block;
            letter-spacing: 2px;
        }

        .download-btn {
            display: block;
            background: linear-gradient(45deg, #ff0000, #990000);
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 18px;
            transition: 0.3s;
            margin-top: 20px;
        }

        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.4);
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>اغاني ساهر - SAHER</h1>
        <p>أهلاً يا وحش! هنا هتلاقي ملف الأغاني اللي شفتها في الفيديو</p>

        <div class="box">
            <h3>📦 ملف الأغاني الكامل (ZIP)</h3>
            <p>الملف مضغوط وبتحتاج برنامج ZArchiver لفك الضغط</p>
            
            <p>كلمة سر فك الضغط هي:</p>
            <div class="password-box">Nemrxx3</div>

            <a href="https://www.mediafire.com/file/p9meyehbwwpn8p1/%25D8%25A7%25D8%25BA%25D8%25A7%25D9%2586%25D9%258A_1.7z/file" class="download-btn">اضغط هنا للتحميل المباشر</a>
        </div>

        <div class="footer">
            جميع الحقوق محفوظة لقناة ساهر © 2026
        </div>
    </div>

</body>
</html>
