<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سباق ساهر - قناة ساهر</title>
    <style>
        :root { --neon: #bc13fe; --track: #222; }
        body { 
            margin: 0; background: #000; color: white; 
            font-family: sans-serif; overflow: hidden; 
            text-align: center; user-select: none; 
            touch-action: none; 
        }
        
        .game-container {
            width: 300px; height: 100vh;
            background: var(--track);
            margin: 0 auto;
            position: relative;
            border-left: 5px dashed var(--neon);
            border-right: 5px dashed var(--neon);
            overflow: hidden;
        }

        .line {
            width: 10px; height: 100px;
            background: white;
            position: absolute; left: 145px;
            animation: moveLines 2s linear infinite;
        }

        @keyframes moveLines {
            0% { top: -150px; }
            100% { top: 100%; }
        }

        .car {
            width: 50px; height: 80px;
            background: var(--neon);
            position: absolute; bottom: 20px; left: 125px;
            border-radius: 10px;
            box-shadow: 0 0 20px var(--neon);
            z-index: 10;
        }

        .enemy {
            width: 50px; height: 80px;
            background: #ff0055;
            position: absolute;
            border-radius: 10px;
            box-shadow: 0 0 15px #ff0055;
            z-index: 5;
        }

        #gameOverBox {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #111;
            border: 3px solid var(--neon);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 40px var(--neon);
            z-index: 2000;
            width: 250px;
        }

        .score { position: fixed; top: 20px; left: 20px; font-size: 1.5rem; color: var(--neon); z-index: 100; }
        
        /* أزرار التحكم - كبرتها شوية عشان صباعك */
        .controls { 
            position: fixed; bottom: 80px; 
            width: 100%; display: flex; 
            justify-content: center; gap: 50px; 
            z-index: 3000; 
        }
        .btn { 
            background: rgba(51, 51, 51, 0.9); 
            border: 3px solid var(--neon); 
            color: white; 
            width: 90px; height: 90px; 
            border-radius: 50%; 
            font-size: 2.5rem; 
            cursor: pointer; 
            display: flex; align-items: center; justify-content: center;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: var(--neon); transform: scale(0.9); }

        .footer-rights {
            position: fixed; bottom: 10px; width: 100%;
            text-align: center; color: #666;
            font-size: 0.75rem; font-family: sans-serif;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="score">النقاط: <span id="scoreVal">0</span></div>

    <div class="game-container" id="gameArea">
        <div class="line" style="top:0;"></div>
        <div class="line" style="top:250px;"></div>
        <div class="line" style="top:500px;"></div>
        <div id="playerCar" class="car"></div>
    </div>

    <div id="gameOverBox">
        <h2 style="color: var(--neon);">يا خسارة يا بطل خسرت 💀</h2>
        <p>نقاطك: <span id="finalScore">0</span></p>
        <button onclick="location.reload()" style="background:var(--neon); color:white; border:none; padding:15px 30px; border-radius:10px; cursor:pointer; font-weight:bold;">العب تاني 🔄</button>
    </div>

    <div class="controls">
        <button class="btn" id="leftBtn" oncontextmenu="return false;">◀️</button>
        <button class="btn" id="rightBtn" oncontextmenu="return false;">▶️</button>
    </div>

    <div class="footer-rights">
        الحقوق محفوظة لقناة ساهر @2026
    </div>

    <script>
        const player = document.getElementById('playerCar');
        const gameArea = document.getElementById('gameArea');
        const scoreVal = document.getElementById('scoreVal');
        const gameOverBox = document.getElementById('gameOverBox');
        
        let playerPos = 125;
        let score = 0;
        let gameActive = true;
        let moveInterval;

        // وظيفة الحركة المستمرة
        function startMove(dir) {
            if (!gameActive) return;
            if (moveInterval) clearInterval(moveInterval);
            moveInterval = setInterval(() => {
                if (dir === 'left' && playerPos > 10) {
                    playerPos -= 7; // السرعة
                } else if (dir === 'right' && playerPos < 240) {
                    playerPos += 7;
                }
                player.style.left = playerPos + 'px';
            }, 20);
        }

        function stopMove() {
            clearInterval(moveInterval);
        }

        // الأزرار
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');

        // أحداث اللمس (للموبايل)
        leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startMove('left'); });
        leftBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopMove(); });
        
        rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startMove('right'); });
        rightBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopMove(); });

        // أحداث الماوس (للكمبيوتر)
        leftBtn.addEventListener('mousedown', () => startMove('left'));
        leftBtn.addEventListener('mouseup', stopMove);
        leftBtn.addEventListener('mouseleave', stopMove);
        
        rightBtn.addEventListener('mousedown', () => startMove('right'));
        rightBtn.addEventListener('mouseup', stopMove);
        rightBtn.addEventListener('mouseleave', stopMove);

        // إنشاء العربيات المنافسة
        function createEnemy() {
            if(!gameActive) return;
            const enemy = document.createElement('div');
            enemy.classList.add('enemy');
            enemy.style.left = Math.floor(Math.random() * 240) + 10 + 'px';
            enemy.style.top = '-100px';
            gameArea.appendChild(enemy);

            let enemyPos = -100;
            let enemyInterval = setInterval(() => {
                if(!gameActive) { clearInterval(enemyInterval); enemy.remove(); return; }
                
                enemyPos += 5; // سرعة العربيات الحمراء
                enemy.style.top = enemyPos + 'px';

                // كشف التصادم
                let pRect = player.getBoundingClientRect();
                let eRect = enemy.getBoundingClientRect();

                if (!(pRect.right < eRect.left || 
                      pRect.left > eRect.right || 
                      pRect.bottom < eRect.top || 
                      pRect.top > eRect.bottom)) {
                    gameActive = false;
                    document.getElementById('finalScore').innerText = score;
                    gameOverBox.style.display = 'block';
                    stopMove();
                }

                if (enemyPos > window.innerHeight) {
                    enemy.remove();
                    score++;
                    scoreVal.innerText = score;
                    clearInterval(enemyInterval);
                }
            }, 20);
        }

        setInterval(createEnemy, 1500);
    </script>
</body>
</html>
