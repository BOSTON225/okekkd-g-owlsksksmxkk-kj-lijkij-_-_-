<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ساهر ضد الكمبيوتر</title>
    <style>
        body {
            background-color: #0d1117;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
        }
        .game-container {
            border: 2px solid #ff0000;
            padding: 20px;
            border-radius: 15px;
            display: inline-block;
            background: #161b22;
        }
        .choices button {
            font-size: 40px;
            padding: 10px;
            margin: 10px;
            cursor: pointer;
            border-radius: 10px;
            border: none;
            background: #30363d;
            transition: 0.2s;
        }
        .choices button:hover { background: #ff0000; }
        #status { font-size: 20px; margin: 20px; color: #58a6ff; }
        #score { font-size: 18px; color: #8b949e; }
        .result-box {
            font-size: 24px;
            font-weight: bold;
            margin-top: 10px;
            min-height: 30px;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>انت🆚الكمبيوتر</h1>
        
        <div id="status">اختار حركتك عشان تبدأ اللعب!</div>
        
        <div class="choices">
            <button onclick="game('حجر')">🪨</button>
            <button onclick="game('ورقة')">📄</button>
            <button onclick="game('مقص')">✂️</button>
        </div>

        <div id="result" class="result-box"></div>
        
        <div id="score">أنت: 0 | الكمبيوتر: 0</div>
    </div>

    <script>
        let userScore = 0;
        let compScore = 0;

        function game(userChoice) {
            const choices = ['حجر', 'ورقة', 'مقص'];
            const compChoice = choices[Math.floor(Math.random() * 3)];
            const resultDiv = document.getElementById('result');
            const scoreDiv = document.getElementById('score');
            const statusDiv = document.getElementById('status');

            statusDiv.innerText = `إنت اخترت (${userChoice}) والكمبيوتر اختار (${compChoice})`;

            if (userChoice === compChoice) {
                resultDiv.innerText = "تعادل! 🤝";
                resultDiv.style.color = "yellow";
            } else if (
                (userChoice === 'حجر' && compChoice === 'مقص') ||
                (userChoice === 'ورقة' && compChoice === 'حجر') ||
                (userChoice === 'مقص' && compChoice === 'ورقة')
            ) {
                resultDiv.innerText = "إنت كسبت يا وحش! 🔥";
                resultDiv.style.color = "#39d353";
                userScore++;
            } else {
                resultDiv.innerText = "الكمبيوتر كسب المرة دي 🤖";
                resultDiv.style.color = "#ff4444";
                compScore++;
            }

            scoreDiv.innerText = `أنت: ${userScore} | الكمبيوتر: ${compScore}`;
        }
    </script>

</body>
</html>
